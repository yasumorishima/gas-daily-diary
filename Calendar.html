<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カレンダー</title>

  <style>
    /* ========================================
       リセットCSS
       ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========================================
       基本スタイル
       ======================================== */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    /* ========================================
       ヘッダー
       ======================================== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .back-btn:active {
      background: rgba(255, 255, 255, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    /* ========================================
       メインコンテナ
       ======================================== */
    .container {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ========================================
       月ナビゲーション
       ======================================== */
    .month-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: white;
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .nav-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .month-title {
      font-size: 20px;
      font-weight: 700;
      color: #202124;
    }

    /* ========================================
       カレンダー
       ======================================== */
    .calendar {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.5s ease;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      padding: 8px 0;
    }

    .weekday.sunday {
      color: #d93025;
    }

    .weekday.saturday {
      color: #1a73e8;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #202124;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .day.other-month {
      color: #dadce0;
    }

    .day.today {
      background: linear-gradient(135deg, #e8f0fe 0%, #f3e8ff 100%);
      color: #667eea;
      font-weight: 700;
    }

    .day.has-entry {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
    }

    .day.has-entry:active {
      transform: scale(0.95);
    }

    .day.today.has-entry {
      background: linear-gradient(135deg, #4c63d2 0%, #5a3586 100%);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
    }

    .mood-indicator {
      font-size: 16px;
      margin-top: 2px;
      line-height: 1;
    }

    /* ========================================
       統計サマリー
       ======================================== */
    .summary {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .summary-card {
      background: white;
      padding: 16px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .summary-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 4px;
    }

    .summary-label {
      font-size: 11px;
      color: #5f6368;
      font-weight: 600;
    }

    /* ========================================
       メッセージ表示
       ======================================== */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #5f6368;
      font-size: 16px;
    }

    .loading::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    .error {
      text-align: center;
      color: #d93025;
      padding: 60px 20px;
      font-size: 16px;
      background: #fce8e6;
      border-radius: 12px;
      margin: 20px;
    }

    /* ========================================
       アニメーション
       ======================================== */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* ========================================
       モーダル
       ======================================== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .modal-close:active {
      background: rgba(255, 255, 255, 0.3);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-mood {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 12px;
    }

    .modal-mood-emoji {
      font-size: 32px;
    }

    .modal-mood-text {
      font-size: 14px;
      color: #5f6368;
      font-weight: 600;
    }

    .modal-content-text {
      color: #202124;
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-wrap;
      margin-bottom: 16px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .modal-tag {
      background: #e8f0fe;
      color: #667eea;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-edit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .modal-btn-edit:active {
      transform: scale(0.98);
    }

    .modal-btn-close {
      background: #f1f3f4;
      color: #5f6368;
    }

    .modal-btn-close:active {
      background: #e8eaed;
    }
  </style>
</head>
<body>
  <!-- ========================================
       ヘッダー
       ======================================== -->
  <div class="header">
    <button type="button" class="back-btn" onclick="navigateToHome()">←</button>
    <h1>カレンダー</h1>
  </div>

  <!-- ========================================
       メインコンテナ
       ======================================== -->
  <div class="container">
    <div id="content" class="loading">読み込み中</div>
  </div>

  <!-- ========================================
       モーダル
       ======================================== -->
  <div id="entryModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button type="button" class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="modalMood" class="modal-mood" style="display: none;">
          <div class="modal-mood-emoji" id="modalMoodEmoji"></div>
          <div class="modal-mood-text" id="modalMoodText"></div>
        </div>
        <div class="modal-content-text" id="modalContent"></div>
        <div id="modalTags" class="modal-tags"></div>
        <div class="modal-footer">
          <button type="button" class="modal-btn modal-btn-edit" onclick="editEntry()" id="modalEditBtn">✏️ 編集</button>
          <button type="button" class="modal-btn modal-btn-close" onclick="closeModal()">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ========================================
       ページ遷移
       ======================================== */
    function navigateToHome() {
      const isInIframe = window.self !== window.top;
      const baseUrl = window.location.origin + window.location.pathname;
      const newUrl = baseUrl + '?page=home';

      if (isInIframe) {
        window.top.location.href = newUrl;
      } else {
        window.location.href = newUrl;
      }
    }

    /* ========================================
       グローバル変数
       ======================================== */
    let currentYear;
    let currentMonth;
    let allEntries = [];
    let selectedEntry = null;
    let selectedDate = null;

    /* ========================================
       初期化
       ======================================== */
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();

    // データ取得開始
    console.log('=== カレンダーページ読み込み開始 ===');
    try {
      console.log('getAllDiaryEntries() 呼び出し開始...');
      google.script.run
        .withSuccessHandler(function(entries) {
          console.log('[OK] Data fetch success:', entries);
          console.log('  件数:', entries ? entries.length : 0);
          if (entries && entries.length > 0) {
            console.log('  最初のエントリー:', entries[0]);
          }
          initCalendar(entries);
        })
        .withFailureHandler(function(error) {
          console.error('❌ データ取得失敗:', error);
          displayError(error);
        })
        .getAllDiaryEntries();
      console.log('getAllDiaryEntries() 呼び出し完了（応答待ち）');
    } catch (e) {
      console.error('❌ データ取得例外:', e);
      displayError('データの取得に失敗しました: ' + e.message);
    }

    /**
     * カレンダーを初期化
     * @param {Array} entries - 全日記エントリー
     */
    function initCalendar(entries) {
      allEntries = entries || [];
      renderCalendar();
    }

    /**
     * カレンダーを描画
     */
    function renderCalendar() {
      const content = document.getElementById('content');

      // 月の最初と最後の日
      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const prevLastDay = new Date(currentYear, currentMonth, 0);

      const firstDayOfWeek = firstDay.getDay();
      const lastDate = lastDay.getDate();
      const prevLastDate = prevLastDay.getDate();

      // 月の統計
      const monthEntries = allEntries.filter(entry => {
        const date = new Date(entry.date);
        return date.getFullYear() === currentYear && date.getMonth() === currentMonth;
      });

      const totalDays = lastDate;
      const writtenDays = monthEntries.length;
      const writeRate = totalDays > 0 ? Math.round((writtenDays / totalDays) * 100) : 0;

      // HTML生成
      let html = `
        <div class="month-nav">
          <button type="button" class="nav-btn" onclick="prevMonth()">‹</button>
          <div class="month-title">${currentYear}年 ${currentMonth + 1}月</div>
          <button type="button" class="nav-btn" onclick="nextMonth()">›</button>
        </div>

        <div class="calendar">
          <div class="weekdays">
            <div class="weekday sunday">日</div>
            <div class="weekday">月</div>
            <div class="weekday">火</div>
            <div class="weekday">水</div>
            <div class="weekday">木</div>
            <div class="weekday">金</div>
            <div class="weekday saturday">土</div>
          </div>

          <div class="days">
      `;

      // 前月の日付
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        html += `<div class="day other-month">${prevLastDate - i}</div>`;
      }

      // 今月の日付
      const today = new Date();
      for (let day = 1; day <= lastDate; day++) {
        const date = new Date(currentYear, currentMonth, day);
        const dateStr = formatDate(date);

        // この日のエントリーを検索
        const entry = monthEntries.find(e => formatDate(new Date(e.date)) === dateStr);

        let classes = 'day';
        if (date.toDateString() === today.toDateString()) {
          classes += ' today';
        }
        if (entry) {
          classes += ' has-entry';
        }

        let moodHtml = '';
        if (entry && entry.mood) {
          const moodEmoji = entry.mood.split(' ')[0];
          moodHtml = `<div class="mood-indicator">${moodEmoji}</div>`;
        }

        const onclick = entry ? `onclick="openModal('${dateStr}')"` : '';
        html += `<div class="${classes}" ${onclick}>${day}${moodHtml}</div>`;
      }

      // 次月の日付（残りを埋める）
      const remainingCells = 42 - (firstDayOfWeek + lastDate);
      for (let day = 1; day <= remainingCells; day++) {
        html += `<div class="day other-month">${day}</div>`;
      }

      html += `
          </div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <div class="summary-value">${writtenDays}</div>
            <div class="summary-label">記録日数</div>
          </div>
          <div class="summary-card">
            <div class="summary-value">${totalDays}</div>
            <div class="summary-label">総日数</div>
          </div>
          <div class="summary-card">
            <div class="summary-value">${writeRate}%</div>
            <div class="summary-label">記録率</div>
          </div>
        </div>
      `;

      content.className = '';
      content.innerHTML = html;
    }

    /**
     * 前月へ
     */
    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }

    /**
     * 次月へ
     */
    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    /**
     * 日付をフォーマット
     * @param {Date} date - 日付オブジェクト
     * @returns {string} フォーマット済み日付
     */
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}/${month}/${day}`;
    }

    /**
     * エラーを表示
     * @param {string} error - エラーメッセージ
     */
    function displayError(error) {
      const content = document.getElementById('content');
      content.className = '';
      content.innerHTML = `
        <div class="error">
          ⚠️ エラーが発生しました<br>
          <br>
          ${escapeHtml(String(error))}<br>
          <br>
          ページを再読み込みしてください
        </div>
      `;
      console.error('エラー:', error);
    }

    /**
     * HTMLエスケープ（XSS対策）
     * @param {string} text - エスケープする文字列
     * @returns {string} エスケープ済み文字列
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* ========================================
       モーダル操作
       ======================================== */

    /**
     * モーダルを開く
     * @param {string} dateStr - 日付文字列 (YYYY/MM/DD)
     */
    function openModal(dateStr) {
      selectedDate = dateStr;
      selectedEntry = allEntries.find(e => e.date === dateStr);

      if (!selectedEntry) {
        console.error('エントリーが見つかりません:', dateStr);
        return;
      }

      // タイトル設定
      const parts = dateStr.split('/');
      const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      const monthDay = `${date.getMonth() + 1}月${date.getDate()}日`;
      const dayOfWeek = selectedEntry.dayOfWeek;
      document.getElementById('modalTitle').textContent = `${selectedEntry.year}年 ${monthDay} (${dayOfWeek})`;

      // 気分設定
      const moodDiv = document.getElementById('modalMood');
      if (selectedEntry.mood) {
        const moodParts = selectedEntry.mood.split(' ');
        const moodEmoji = moodParts[0];
        const moodText = moodParts.slice(1).join(' ');
        document.getElementById('modalMoodEmoji').textContent = moodEmoji;
        document.getElementById('modalMoodText').textContent = moodText;
        moodDiv.style.display = 'flex';
      } else {
        moodDiv.style.display = 'none';
      }

      // 内容設定
      document.getElementById('modalContent').textContent = selectedEntry.content;

      // タグ設定
      const tagsDiv = document.getElementById('modalTags');
      tagsDiv.innerHTML = '';
      if (selectedEntry.tags) {
        const tagList = selectedEntry.tags.split(',').map(t => t.trim()).filter(t => t);
        tagList.forEach(tag => {
          const tagSpan = document.createElement('span');
          tagSpan.className = 'modal-tag';
          tagSpan.textContent = tag;
          tagsDiv.appendChild(tagSpan);
        });
      }

      // モーダル表示
      document.getElementById('entryModal').classList.add('show');
    }

    /**
     * モーダルを閉じる
     * @param {Event} event - クリックイベント（背景クリック時）
     */
    function closeModal(event) {
      if (event && event.target.id !== 'entryModal' && event.type === 'click') {
        return;
      }
      document.getElementById('entryModal').classList.remove('show');
      selectedEntry = null;
      selectedDate = null;
    }

    /**
     * 編集ボタンクリック時
     */
    function editEntry() {
      if (!selectedDate) return;

      const parts = selectedDate.split('/');
      const year = parts[0];
      const month = parts[1].padStart(2, '0');
      const day = parts[2].padStart(2, '0');
      const dateValue = `${year}-${month}-${day}`;

      const isInIframe = window.self !== window.top;
      const baseUrl = window.location.origin + window.location.pathname;
      const newUrl = baseUrl + '?page=write&date=' + dateValue;

      if (isInIframe) {
        window.top.location.href = newUrl;
      } else {
        window.location.href = newUrl;
      }
    }
  </script>
</body>
</html>
